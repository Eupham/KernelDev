# BF16 Training Configuration (bf16, balanced model)
# For modern GPUs with bf16 support (A100, H100, RTX 30xx/40xx series)

training:
  precision: "bf16"          # Use bf16 for balanced performance and stability
  epochs: 3                  # Standard epochs for development
  learning_rate: 0.0001      # Slightly conservative LR for bf16
  batch_size: null           # Auto-estimate batch size
  weight_decay: 0.01
  warmup_steps: 100          # Standard warmup
  max_grad_norm: 1.0
  save_every: 500            # Save checkpoints regularly
  eval_every: 200            # Regular evaluation
  log_every: 50              # Regular logging
  checkpoint_dir: "checkpoints_bf16"

data:
  dataset_name: "allenai/c4"
  dataset_config: "en"
  seq_len: 1024              # Balanced sequence length
  max_samples: 5000          # Standard samples for development
  max_eval_tokens: 50000     # Standard eval tokens
  num_workers: 0
  shuffle_train: true

model:
  vocab_size: 256
  dim: 1024                  # Balanced model dimension
  n_layers: 12               # Standard layers
  n_heads: 16                # Standard heads
  max_seq_len: 2048          # Standard max sequence
  mlp_ratio: 4
  causal: true

hardware:
  available_memory_gb: 15
  device: "auto"
  memory_buffer_gb: 3        # Slightly larger buffer for bf16

evaluation:
  max_eval_batches: 10       # Standard evaluation
  max_val_batches: 50

generation:
  max_length: 50             # Standard generation length
  temperature: 0.8
  top_k: 50
  test_prompts:
    - ""
    - "The future of AI"
    - "In a world where"
    - "Once upon a time"

logging:
  show_gpu_info: true
  show_memory_estimation: true
  test_attention_modes: true
  test_generation: true
  save_training_plots: true

random_seed: 42
