# Modal-optimized configuration for KernelDev training
# This config is specifically tuned for cloud GPU training

# Training Configuration
training:
  # Use mixed precision for better performance on modern GPUs
  precision: 16
  
  # Reduced epochs for faster experimentation
  epochs: 2
  
  # Learning rate optimized for mixed precision
  learning_rate: 0.0003  # 3e-4
  
  # Batch size will be auto-estimated based on GPU memory
  batch_size: null
  
  # Weight decay for regularization
  weight_decay: 0.01
  
  # Warmup steps
  warmup_steps: 100
  
  # Maximum gradient norm for clipping
  max_grad_norm: 1.0
  
  # More frequent checkpointing for cloud environments
  save_every: 250      # Save checkpoint every N steps
  eval_every: 100      # Evaluate on validation set every N steps  
  log_every: 25        # Log training metrics every N steps

# Data Configuration
data:
  # Sequence length for training
  seq_len: 256
  
  # Dataset settings
  dataset_name: "wikitext"
  dataset_config: "wikitext-2-raw-v1"
  
  # Data loading
  num_workers: 4       # More workers for faster data loading
  shuffle_train: true
  
  # Validation split
  val_split: 0.1

# Model Configuration  
model:
  # Model architecture
  vocab_size: 256      # Will be overridden by tokenizer
  n_embed: 384         # Embedding dimension
  n_head: 6            # Number of attention heads
  n_layer: 6           # Number of transformer layers
  block_size: 256      # Context length
  
  # Regularization
  dropout: 0.1
  
  # Flash attention settings
  use_flash_attention: true

# Hardware Configuration
hardware:
  # GPU settings - will be overridden by Modal
  device: "auto"
  
  # Memory optimization
  gradient_checkpointing: false  # Disable for speed on high-memory GPUs
  
  # Distributed training (Modal handles this)
  distributed: false

# Evaluation Configuration
evaluation:
  # Evaluation settings
  eval_steps: 100
  
  # Generation settings for testing
  max_length: 128
  temperature: 0.8
  top_k: 50

# Generation Configuration (for testing)
generation:
  max_length: 100
  temperature: 0.8
  top_k: 40
  top_p: 0.9
  do_sample: true
  num_return_sequences: 3

# Logging Configuration
logging:
  # Output settings
  log_level: "INFO"
  
  # What to log/save
  save_plots: true
  test_generation: true
  
  # Checkpoint settings
  save_best_only: false
  checkpoint_dir: "checkpoints"
