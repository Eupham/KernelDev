data:
  dataset_config: wikitext-2-raw-v1
  dataset_name: wikitext
  max_eval_tokens: 50000
  max_samples: 1000
  num_workers: 0
  seq_len: 1024
  shuffle_train: true
evaluation:
  max_eval_batches: 10
  max_val_batches: 50
generation:
  max_length: 50
  temperature: 0.8
  test_prompts:
  - ''
  - The
  - In a world where
  top_k: 50
hardware:
  available_memory_gb: 79
  device: auto
  memory_buffer_gb: 4
logging:
  save_training_plots: true
  show_gpu_info: true
  show_memory_estimation: true
  test_attention_modes: true
  test_generation: true
model:
  bidirectional_prefix_len: 1
  causal: true
  dim: 2048
  max_seq_len: 2048
  mlp_ratio: 4
  n_heads: 16
  n_layers: 12
  vocab_size: 256
random_seed: 42
tasks:
  cocktail_party:
    max_span_size: 200
    min_span_size: 100
    num_distractors: 3
    weight: 1.0
  teacher_forcing:
    weight: 1.0
training:
  auto_resume: true
  batch_size: null
  checkpoint_dir: checkpoints
  epochs: 3
  eval_every: 200
  learning_rate: 3.0e-05
  log_every: 50
  max_checkpoints: 2
  max_grad_norm: 1.0
  plateau_mode: min
  plateau_monitor_metric: val_loss
  plateau_patience: 10
  plateau_threshold: 0.0001
  precision: bf16
  save_every: 1000
  save_logs_json_every: 500
  scheduler_T0_epoch_fraction: 0.1
  scheduler_T_mult: 1
  warmup_steps: 100
  weight_decay: 0.01
